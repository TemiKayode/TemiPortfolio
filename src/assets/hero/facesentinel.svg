<svg width="300" height="500" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="fs-win-clip">
      <rect x="55" y="70" width="190" height="180" rx="20"/>
    </clipPath>
    <filter id="fs-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="fs-badge-shadow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="fs-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <ellipse cx="150" cy="478" rx="72" ry="11" fill="rgba(0,0,0,0.16)"/>

  <ellipse cx="150" cy="160" rx="132" ry="108" fill="#C0623F" opacity="0.28" filter="url(#fs-glow)"/>

  <g filter="url(#fs-shadow)">
    <g clip-path="url(#fs-win-clip)">
      <rect x="55" y="70" width="190" height="180" fill="#FFFFFF"/>
      <rect x="55" y="70" width="190" height="28" fill="#EFEFEF"/>
      <circle cx="72" cy="84" r="3.4" fill="#F2705C"/>
      <circle cx="84" cy="84" r="3.4" fill="#F4B740"/>
      <circle cx="96" cy="84" r="3.4" fill="#4CAF6D"/>

      <!-- scan brackets -->
      <path d="M100 116 v-16 h16" stroke="#C0623F" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M200 100 h16 v16" stroke="#C0623F" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M100 222 v16 h16" stroke="#C0623F" stroke-width="5" stroke-linecap="round" fill="none"/>
      <path d="M200 238 h16 v-16" stroke="#C0623F" stroke-width="5" stroke-linecap="round" fill="none"/>

      <!-- face -->
      <rect x="118" y="118" width="64" height="76" rx="16" fill="none" stroke="#C0623F" stroke-width="5"/>
      <circle cx="136" cy="146" r="5.5" fill="#C0623F"/>
      <circle cx="164" cy="146" r="5.5" fill="#C0623F"/>
      <rect x="128" y="170" width="44" height="5" rx="2.5" fill="#C0623F" opacity="0.85"/>
      <line x1="150" y1="118" x2="150" y2="194" stroke="#C0623F" stroke-width="2" stroke-dasharray="4 6" opacity="0.5"/>
    </g>
    <rect x="55" y="70" width="190" height="180" rx="20" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  </g>

  <g filter="url(#fs-badge-shadow)">
    <circle cx="223" cy="228" r="22" fill="#C0623F"/>
    <path d="M212 228 l7 7 l13 -15" stroke="#FFFFFF" stroke-width="4" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
