<svg width="300" height="500" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="hb-win-clip">
      <rect x="55" y="70" width="190" height="180" rx="20"/>
    </clipPath>
    <filter id="hb-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="hb-badge-shadow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="hb-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <ellipse cx="150" cy="478" rx="72" ry="11" fill="rgba(0,0,0,0.16)"/>

  <ellipse cx="150" cy="160" rx="132" ry="108" fill="#3E7A5D" opacity="0.28" filter="url(#hb-glow)"/>

  <g filter="url(#hb-shadow)">
    <g clip-path="url(#hb-win-clip)">
      <rect x="55" y="70" width="190" height="180" fill="#FFFFFF"/>
      <rect x="55" y="70" width="190" height="28" fill="#EFEFEF"/>
      <circle cx="72" cy="84" r="3.4" fill="#F2705C"/>
      <circle cx="84" cy="84" r="3.4" fill="#F4B740"/>
      <circle cx="96" cy="84" r="3.4" fill="#4CAF6D"/>

      <!-- network graph -->
      <line x1="150" y1="122" x2="112" y2="188" stroke="#3E7A5D" stroke-width="4.5"/>
      <line x1="150" y1="122" x2="188" y2="188" stroke="#3E7A5D" stroke-width="4.5"/>
      <line x1="112" y1="188" x2="188" y2="188" stroke="#3E7A5D" stroke-width="4.5"/>

      <circle cx="150" cy="122" r="13" fill="#3E7A5D"/>
      <circle cx="112" cy="188" r="13" fill="#3E7A5D"/>
      <circle cx="188" cy="188" r="15" fill="#FFFFFF" stroke="#3E7A5D" stroke-width="4.5"/>

      <path d="M188 164 l10.5 19 h-21 z" fill="#C0623F"/>
      <rect x="186.3" y="172" width="3.4" height="7" rx="1.7" fill="#FFFFFF"/>
      <circle cx="188" cy="182.5" r="1.8" fill="#FFFFFF"/>
    </g>
    <rect x="55" y="70" width="190" height="180" rx="20" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  </g>

  <g filter="url(#hb-badge-shadow)">
    <circle cx="223" cy="228" r="22" fill="#3E7A5D"/>
    <path d="M223 214 l10 4 v9 c0 7 -4.5 11 -10 13 c-5.5 -2 -10 -6 -10 -13 v-9 z" fill="none" stroke="#FFFFFF" stroke-width="2.6" stroke-linejoin="round"/>
  </g>
</svg>
