<svg width="300" height="500" viewBox="0 0 300 500" fill="none" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="fa-win-clip">
      <rect x="55" y="70" width="190" height="180" rx="20"/>
    </clipPath>
    <filter id="fa-shadow" x="-50%" y="-50%" width="200%" height="200%">
      <feDropShadow dx="0" dy="10" stdDeviation="12" flood-color="#000000" flood-opacity="0.22"/>
    </filter>
    <filter id="fa-badge-shadow" x="-80%" y="-80%" width="260%" height="260%">
      <feDropShadow dx="0" dy="3" stdDeviation="4" flood-color="#000000" flood-opacity="0.28"/>
    </filter>
    <filter id="fa-glow" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="22"/>
    </filter>
  </defs>

  <ellipse cx="150" cy="478" rx="72" ry="11" fill="rgba(0,0,0,0.16)"/>

  <ellipse cx="150" cy="160" rx="132" ry="108" fill="#2F6690" opacity="0.28" filter="url(#fa-glow)"/>

  <g filter="url(#fa-shadow)">
    <g clip-path="url(#fa-win-clip)">
      <rect x="55" y="70" width="190" height="180" fill="#FFFFFF"/>
      <rect x="55" y="70" width="190" height="28" fill="#EFEFEF"/>
      <circle cx="72" cy="84" r="3.4" fill="#F2705C"/>
      <circle cx="84" cy="84" r="3.4" fill="#F4B740"/>
      <circle cx="96" cy="84" r="3.4" fill="#4CAF6D"/>

      <!-- bar chart -->
      <rect x="108" y="176" width="18" height="46" rx="3" fill="#2F6690" opacity="0.5"/>
      <rect x="134" y="152" width="18" height="70" rx="3" fill="#2F6690" opacity="0.75"/>
      <rect x="160" y="126" width="18" height="96" rx="3" fill="#2F6690"/>

      <!-- trend line over bars -->
      <path d="M117 168 L143 144 L169 118" stroke="#C0623F" stroke-width="3" fill="none" stroke-linecap="round" stroke-linejoin="round"/>
      <circle cx="117" cy="168" r="4" fill="#C0623F"/>
      <circle cx="143" cy="144" r="4" fill="#C0623F"/>
      <circle cx="169" cy="118" r="4" fill="#C0623F"/>

      <!-- ball / globe -->
      <circle cx="205" cy="104" r="17" fill="#FFFFFF" stroke="#2F6690" stroke-width="4"/>
      <path d="M188 104 h34 M205 87 q-9 17 0 34 M205 87 q9 17 0 34" stroke="#2F6690" stroke-width="2" fill="none"/>
    </g>
    <rect x="55" y="70" width="190" height="180" rx="20" fill="none" stroke="rgba(0,0,0,0.08)" stroke-width="1"/>
  </g>

  <g filter="url(#fa-badge-shadow)">
    <circle cx="223" cy="228" r="22" fill="#2F6690"/>
    <path d="M214 232 l8 -12 l6 7 l9 -13" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
    <path d="M231 212 h6 v6" stroke="#FFFFFF" stroke-width="2.6" stroke-linecap="round" stroke-linejoin="round" fill="none"/>
  </g>
</svg>
